<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Today's Deals - Amazon</title>
<link rel="icon" type="image/svg+xml" href="amazon_logo.svg">
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<header>
  <div class="navbar-top">
    <div class="logo-container">
      <a href="index.html">
        <img class="amazon-logo" src="amazon_logo.svg" alt="amazon logo">
      </a>
    </div>
    <div class="search-container">
      <select class="search-select"><option>All</option></select>
      <input type="text" id="search-input" class="search-input" placeholder="Search Amazon">
      <button class="search-button" onclick="doSearch()">
        <img class="icon-search" src="icons/search.svg" alt="search">
      </button>
    </div>
    <a href="signin.html" style="text-decoration:none;">
    <div class="account-container" style="color: white; margin-left:20px;">
      <div>Hello, sign in</div>
      <div style="font-weight: bold; font-size: 13px;">Account</div>
    </div>
    </a>
    <a href="cart.html" style="text-decoration:none;">
    <div class="cart-container">
      <img class="icon-cart" src="icons/cart.svg" alt="cart">
      <span class="cart-count">0</span>
      <span style="color: white; font-size: 13px; font-weight: bold;">Cart</span>
    </div>
    </a>
  </div>
  <div class="navbar-sub">
    <a href="index.html" class="sub-link">Home</a>
    <a href="deals.html" class="sub-link">Today's Deals</a>
    <a href="fashion.html" class="sub-link">Fashion</a>
    <a href="electronics.html" class="sub-link">Electronics</a>
    <a href="gaming.html" class="sub-link">Gaming</a>
  </div>
</header>

<br>
<div class="breadcrumb">
  <a href="index.html">Home</a> &gt; Today's Deals
</div>

<main class="page-main">
  <div class="page-box">
    <h2>Today's Deals</h2>
    <p style="color:#666; margin-bottom:15px; font-size:14px;">Best offers for today. Click any product to see details.</p>
    <div id="category-products" class="product-list-grid">
      <p>Loading deals...</p>
    </div>
  </div>
</main>

<footer>
  <a href="#" class="back-to-top">Back to top</a>
  <div class="footer-bottom">
    <div class="copyright">&copy; 1996-2026, Amazon.com, Inc. or its affiliates</div>
    <div class="made-by">Made by Priyanshu Gupta</div>
  </div>
</footer>
<script type="text/javascript" src="script.js"></script>
</body>
</html>
