<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <title>Amazon</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
 <header>
   <div class="navbar-top">
     <div class="logo-container">
   <a href="#">
      <img class="amazon-logo" src="amazon_logo.svg">
    </a>
       </div>
    <div class="location-container">
       <img class="icon-location" src="icons/location.svg">
     <div class="location-text">
       <div class="label-top">Deliver to</div>
      <div class="label-bottom">India</div>
     </div>
    </div>
    <div class="search-container">
      <select class="search-select">
        <option>All</option>
         <option>Books</option>
         <option>Electronics</option>
       </select>
       <input type="text" class="search-input" placeholder="Search Amazon">
       <button class="search-button">
         <img class="icon-search" src="icons/search.svg">
       </button>
     </div>
      <div class="language-container">
        <img class="icon-flag" src="icons/flag_in.svg">
       <span>IN</span>
     </div>
     <div class="account-container">
       <div>Hello, sign in</div>
       <div style="font-weight: bold;">Account & Lists</div>
     </div>
      <div class="orders-container">
       <div>Returns</div>
       <div style="font-weight: bold;">& Orders</div>
     </div>
     <div class="cart-container">
       <img class="icon-cart" src="icons/cart.svg">
       <span class="cart-count">0</span>
        <span>Cart</span>
     </div>
   </div>
   <div class="navbar-sub">
     <span class="sub-menu">☰ All</span>
     <a href="#" class="sub-link">Today's Deals</a>
     <a href="#" class="sub-link">Customer Service</a>
     <a href="#" class="sub-link">Registry</a>
      <a href="#" class="sub-link">Gift Cards</a>
     <a href="#" class="sub-link">Sell</a>
   </div>
 </header>
  <main>
    <div class="hero-container">
   <div class="slides">
 <img class="slide" src="images/619geyiQI5L._SX3000_.jpg">
   <img class="slide" src="images/61Yx5-N155L._SX3000_.jpg" style="display:none;">
    <img class="slide" src="images/71QcgptqadL._SX3000_.jpg" style="display:none;">
      <img class="slide" src="images/71qcoYgEhzL._SX3000_.jpg" style="display:none;">
   </div>
   <button class="slider-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>
  <button class="slider-btn next-btn" onclick="changeSlide(1)">&#10095;</button>
    </div>
  <div class="product-grid">
    <div class="card">
   <h3>Get your game on</h3>
   <div class="card-img-container">
     <img src="images/619geyiQI5L._SX3000_.jpg">
   </div>
    <a href="#">Shop gaming</a>
     </div>
    <div class="card">
  <h3>Shop Fashion for less</h3>
    <div class="card-img-container">
      <img src="images/71QcgptqadL._SX3000_.jpg">
   </div>
   <a href="#">See all deals</a>
     </div>
   <div class="card">
     <h3>New home arrivals</h3>
     <div class="card-img-container">
       <img src="images/71qcoYgEhzL._SX3000_.jpg">
     </div>
     <a href="#">Shop now</a>
   </div>
    <div class="card">
      <h3>Deals on Beauty</h3>
      <div class="card-img-container">
        <img src="images/61Yx5-N155L._SX3000_.jpg">
      </div>
      <a href="#">Explore more</a>
    </div>
  </div>
  </main>

<script>
var cur=0
 function changeSlide(n){
   var slides = document.getElementsByClassName("slide")
  slides[cur].style.display = "none"
   cur=cur+n
  if(cur>=slides.length){
    cur=0
  }
   if(cur<0){
     cur=slides.length-1
   }
   slides[cur].style.display = "block"
 }
</script>
</body>
</html>
